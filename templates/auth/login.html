{% extends "base.html" %}
{% block title %}Sign In — TenderFlow{% endblock %}

{% block auth_content %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-xl">
        <span class="text-white font-bold text-3xl">T</span>
      </div>
      <h1 class="text-white text-2xl font-bold">TenderFlow</h1>
      <p class="text-slate-400 text-sm mt-1">Proposal Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-slate-900 text-xl font-semibold mb-1">Welcome back</h2>
      <p class="text-slate-500 text-sm mb-6">Sign in to your account to continue</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-5 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input type="email" name="email" required autocomplete="email"
                 class="form-input" placeholder="you@company.com"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="form-input" placeholder="••••••••"/>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
            <input type="checkbox" name="remember" class="rounded border-slate-300 text-indigo-600"/>
            Remember me
          </label>
        </div>
        <button type="submit" class="w-full btn-primary py-2.5 text-center justify-center">
          Sign in →
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account?
        <a href="/auth/signup" class="text-indigo-600 hover:underline font-medium">Create one</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
